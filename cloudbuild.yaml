steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'us-central1-docker.pkg.dev/just-pittsburgh-news/just-pittsburgh-news/just-pittsburgh-news:$COMMIT_SHA',
        '.'
      ]

  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'push',
        'us-central1-docker.pkg.dev/just-pittsburgh-news/my-repo/just-pittsburgh-news:$COMMIT_SHA'
      ]

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      [
        'run',
        'deploy',
        'my-app',
        '--image',
        'us-central1-docker.pkg.dev/just-pittsburgh-news/my-repo/just-pittsburgh-news:$COMMIT_SHA',
        '--region',
        'us-central1',
        '--platform',
        'managed',
        '--allow-unauthenticated'
      ]

images:
  - 'us-central1-docker.pkg.dev/just-pittsburgh-news/my-repo/just-pittsburgh-news:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY