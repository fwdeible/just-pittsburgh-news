<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Pittsburgh News Feed</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background-color: #0f172a;
        }

        .scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
        }

        .scrollbar::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
    </style>
</head>

<body class="text-slate-200 min-h-screen">

<div class="flex flex-col h-screen">

    <!-- HEADER -->
    <header class="border-b border-slate-700 bg-slate-900 px-6 py-4 flex items-center justify-between">

        <div>
            <h1 class="text-2xl font-bold tracking-wide">
                Pittsburgh Feed
            </h1>

            <p class="text-sm text-slate-400">
                Local relevance monitoring dashboard
            </p>
        </div>

        <div class="flex gap-3">

            <button id="refreshBtn"
                    class="bg-blue-600 hover:bg-blue-500 transition px-4 py-2 rounded-lg font-medium">
                Refresh
            </button>

        </div>
    </header>

    <!-- MAIN -->
    <div class="flex flex-1 overflow-hidden">

        <!-- SIDEBAR -->
        <aside class="w-64 border-r border-slate-700 bg-slate-900 p-4 overflow-y-auto scrollbar">

            <h2 class="text-lg font-semibold mb-4">
                Filters
            </h2>

            <div class="space-y-2">

                <button class="filter-btn w-full text-left bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded-lg"
                        data-category="ALL">
                    All
                </button>

                <button class="filter-btn w-full text-left bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded-lg"
                        data-category="TRAFFIC">
                    Traffic
                </button>

                <button class="filter-btn w-full text-left bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded-lg"
                        data-category="WEATHER">
                    Weather
                </button>

                <button class="filter-btn w-full text-left bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded-lg"
                        data-category="CRIME">
                    Crime
                </button>

                <button class="filter-btn w-full text-left bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded-lg"
                        data-category="SPORTS">
                    Sports
                </button>

                <button class="filter-btn w-full text-left bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded-lg"
                        data-category="POLITICS">
                    Politics
                </button>

            </div>

            <hr class="my-6 border-slate-700" />

            <div>
                <label class="block mb-2 text-sm text-slate-400">
                    Minimum Relevance Score
                </label>

                <input id="relevanceScoreSlider"
                       type="range"
                       min="0"
                       max="30"
                       value="0"
                       class="w-full" />

                <div class="mt-2 text-sm text-slate-300">
                    Score:
                    <span id="relevanceScoreValue">0</span>
                </div>
            </div>

            <div>
                <label class="block mb-2 text-sm text-slate-400">
                    Minimum Importance Score
                </label>

                <input id="importanceScoreSlider"
                       type="range"
                       min="0"
                       max="30"
                       value="0"
                       class="w-full" />

                <div class="mt-2 text-sm text-slate-300">
                    Score:
                    <span id="importanceScoreValue">0</span>
                </div>
            </div>

        </aside>

        <!-- FEED -->
        <main class="flex-1 overflow-y-auto scrollbar p-6">

            <div class="flex items-center justify-between mb-6">

                <div>
                    <h2 class="text-xl font-semibold">
                        Feed
                    </h2>

                    <p id="articleCount"
                       class="text-sm text-slate-400 mt-1">
                        Loading...
                    </p>
                </div>

            </div>

            <div id="articlesContainer"
                 class="space-y-5">

            </div>

        </main>

    </div>

</div>

<script>

    // =========================================
    // CONFIG
    // =========================================

    const API_URL = "http://localhost:8080/getLocalArticles";

    // =========================================
    // STATE
    // =========================================

    let articles = [];

    let selectedCategory = "ALL";

    let minimumRelevanceScore = 0;
    let minimumImportanceScore = 0;

    // =========================================
    // CATEGORY COLORS
    // =========================================

    const categoryColors = {
        TRAFFIC: "bg-orange-500/20 text-orange-300 border border-orange-500/30",
        WEATHER: "bg-blue-500/20 text-blue-300 border border-blue-500/30",
        CRIME: "bg-red-500/20 text-red-300 border border-red-500/30",
        SPORTS: "bg-yellow-500/20 text-yellow-300 border border-yellow-500/30",
        POLITICS: "bg-purple-500/20 text-purple-300 border border-purple-500/30",
        BUSINESS: "bg-green-500/20 text-green-300 border border-green-500/30",
        DEFAULT: "bg-slate-700 text-slate-200 border border-slate-600"
    };

    // =========================================
    // LOAD ARTICLES
    // =========================================

    async function loadArticles() {

        try {

            const response = await fetch(API_URL);

            articles = await response.json();

            renderArticles();

        } catch (error) {

            console.error(error);

            document.getElementById("articlesContainer").innerHTML = `
                <div class="bg-red-900/30 border border-red-700 rounded-xl p-4">
                    Failed to load articles from backend.
                </div>
            `;
        }
    }

    // =========================================
    // RENDER ARTICLES
    // =========================================

    function renderArticles() {

        const container =
            document.getElementById("articlesContainer");

        let filtered =
            articles.filter(article => {

                const matchesCategory =
                    selectedCategory === "ALL" ||
                    article.category === selectedCategory;

                const matchesRelevanceScore =
                    (article.relevanceScore || 0) >= minimumRelevanceScore;

                const matchesImportanceScore =
                    (article.importanceScore || 0) >= minimumImportanceScore;

                return matchesCategory && matchesRelevanceScore && matchesImportanceScore;
            });

        // filtered.sort((a, b) => {
        //     return (b.importanceScore || 0) -
        //         (a.importanceScore || 0);
        // });

        document.getElementById("articleCount").innerText =
            `${filtered.length} articles`;

        if (filtered.length === 0) {

            container.innerHTML = `
                <div class="bg-slate-800 border border-slate-700 rounded-xl p-6 text-slate-400">
                    No matching articles.
                </div>
            `;

            return;
        }

        container.innerHTML =
            filtered.map(article => createArticleCard(article))
                .join("");
    }

    // =========================================
    // CREATE CARD
    // =========================================

    function createArticleCard(article) {

        const category =
            article.category || "UNCATEGORIZED";

        const categoryClass =
            categoryColors[category] ||
            categoryColors.DEFAULT;

        const matchedKeywords =
            parseMatchedKeywords(article.matchedKeywords);

        return `
            <div class="bg-slate-800 border border-slate-700 rounded-2xl p-5 hover:border-slate-500 transition">

                <!-- TOP -->
                <div class="flex items-start justify-between gap-4">

                    <div class="flex-1">

                        <div class="flex items-center gap-2 flex-wrap mb-3">

                            <span class="px-2 py-1 rounded-lg text-xs font-semibold ${categoryClass}">
                                ${category}
                            </span>

                            <span class="bg-slate-700 px-2 py-1 rounded-lg text-xs">
                                Relevance: ${article.relevanceScore ?? 0}
                            </span>

                            <span class="bg-slate-700 px-2 py-1 rounded-lg text-xs">
                                Importance: ${article.importanceScore ?? 0}
                            </span>

                        </div>

                        <a href="${article.articleUrl}"
                           target="_blank"
                           class="text-xl font-semibold hover:text-blue-400 transition">

                            ${escapeHtml(article.title)}

                        </a>

                        <div class="mt-2 text-sm text-slate-400">

                            ${escapeHtml(article.source || "Unknown Source")}
                            •
                            ${formatDate(article.publishedAt)}

                        </div>

                    </div>

                </div>

                <!-- DESCRIPTION -->
                <div class="mt-4 text-slate-300 leading-relaxed">

                    ${escapeHtml(article.description || "No description available.")}

                </div>

                <!-- MATCHED KEYWORDS -->
                <div class="mt-5">

                    <div class="text-xs uppercase tracking-wide text-slate-500 mb-2">
                        Matched Keywords
                    </div>

                    <div class="flex flex-wrap gap-2">

                        ${matchedKeywords.map(keyword => `
                            <span class="bg-blue-900/40 border border-blue-700/40 text-blue-300 px-2 py-1 rounded-lg text-xs">
                                ${escapeHtml(keyword)}
                            </span>
                        `).join("")}

                    </div>

                </div>

            </div>
        `;
    }

    // =========================================
    // HELPERS
    // =========================================

    function parseMatchedKeywords(value) {

        if (!value) {
            return [];
        }

        if (Array.isArray(value)) {
            return value;
        }

        return value
            .split(",")
            .map(v => v.trim())
            .filter(v => v.length > 0);
    }

    function formatDate(dateString) {

        if (!dateString) {
            return "Unknown time";
        }

        return new Date(dateString)
            .toLocaleString();
    }

    function escapeHtml(text) {

        if (!text) {
            return "";
        }

        return text
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;");
    }

    // =========================================
    // FILTER EVENTS
    // =========================================

    document.querySelectorAll(".filter-btn")
        .forEach(button => {

            button.addEventListener("click", () => {

                selectedCategory =
                    button.dataset.category;

                renderArticles();
            });
        });

    // =========================================
    // SCORE SLIDER
    // =========================================

    const relevanceScoreSlider =
        document.getElementById("relevanceScoreSlider");

    relevanceScoreSlider.addEventListener("input", (e) => {

        minimumRelevanceScore =
            Number(e.target.value);

        document.getElementById("relevanceScoreValue")
            .innerText = minimumRelevanceScore;

        renderArticles();
    });

    const importanceScoreSlider =
        document.getElementById("importanceScoreSlider");

    importanceScoreSlider.addEventListener("input", (e) => {

        minimumImportanceScore =
            Number(e.target.value);

        document.getElementById("importanceScoreValue")
            .innerText = minimumImportanceScore;

        renderArticles();
    });

    // =========================================
    // REFRESH BUTTON
    // =========================================

    document.getElementById("refreshBtn")
        .addEventListener("click", loadArticles);

    // =========================================
    // AUTO REFRESH
    // =========================================

    setInterval(loadArticles, 30000);

    // =========================================
    // INITIAL LOAD
    // =========================================

    loadArticles();

</script>

</body>
</html>
