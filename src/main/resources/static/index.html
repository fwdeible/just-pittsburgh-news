<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Just Pittsburgh News</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>

        :root {
            --pittsburgh-gold: #ffb81c;
            --pittsburgh-gold-dark: #d89a00;
            --background-main: #050505;
            --background-card: #111111;
            --background-sidebar: #0b0b0b;
            --border-color: #2b2b2b;
        }

        body {
            background-color: var(--background-main);
        }

        .scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .scrollbar::-webkit-scrollbar-track {
            background: #111;
        }

        .scrollbar::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        .gold-gradient {
            background: linear-gradient(
                    90deg,
                    #ffb81c 0%,
                    #ffd24d 50%,
                    #ffb81c 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-transition {
            transition: transform 0.25s ease;
        }

        @media (max-width: 768px) {

            #sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100%;
                width: 280px;
                z-index: 50;
                transform: translateX(-100%);
                box-shadow: 0 0 25px rgba(0,0,0,0.8);
            }

            #sidebar.open {
                transform: translateX(0);
            }

            #mobileOverlay {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.65);
                z-index: 40;
                display: none;
            }

            #mobileOverlay.visible {
                display: block;
            }
        }

    </style>
</head>

<body class="text-zinc-100 min-h-screen">

<div class="flex flex-col h-screen">

    <!-- HEADER -->
    <header class="border-b border-zinc-800 bg-black px-4 md:px-6 py-4 flex items-center justify-between">

        <div class="flex items-center gap-4">

            <!-- MOBILE MENU BUTTON -->
            <button id="menuToggleBtn"
                    class="md:hidden bg-zinc-900 border border-zinc-700 hover:border-yellow-500 p-2 rounded-lg">

                ☰

            </button>

            <div>
                <img src="images/bot.png"  width="100" alt="Logo"/>
            </div>

            <div>

                <h1 class="text-2xl font-black tracking-wide gold-gradient">
                    Just Pittsburgh News
                </h1>

                <p class="text-sm text-zinc-500">
                    Local relevance monitoring dashboard
                </p>


            </div>

        </div>

<!--        <div class="flex items-center gap-4">-->
<!--            <img src="images/bot_banner.png"  width="600" alt="Bot Logo"/>-->
<!--        </div>-->
<!--        -->
        <div class="flex gap-3">
            <a href="about.html" >
            <button href="about.html"  id="refreshBtn"
                    class="bg-yellow-500 hover:bg-yellow-400 text-black font-bold transition px-4 py-2 rounded-xl shadow-lg shadow-yellow-500/20">
                About
            </button> </a>
            <button id="refreshBtn"
                    class="bg-yellow-500 hover:bg-yellow-400 text-black font-bold transition px-4 py-2 rounded-xl shadow-lg shadow-yellow-500/20">
                Refresh
            </button>

        </div>

    </header>

    <!-- MAIN -->
    <div class="flex flex-1 overflow-hidden relative">

        <!-- MOBILE OVERLAY -->
        <div id="mobileOverlay"></div>

        <!-- SIDEBAR -->
        <aside id="sidebar"
               class="sidebar-transition w-72 border-r border-zinc-800 bg-[#0a0a0a] p-4 overflow-y-auto scrollbar md:relative md:translate-x-0">

            <div class="flex items-center justify-between mb-6">

                <h2 class="text-lg font-bold text-yellow-400">
                    Filters (Coming Soon)
                </h2>

                <button id="closeSidebarBtn"
                        class="md:hidden text-zinc-400 hover:text-white text-xl">
                    ×
                </button>

            </div>

            <div class="space-y-2">

                <button class="filter-btn w-full text-left bg-zinc-900 hover:bg-yellow-500 hover:text-black border border-zinc-800 hover:border-yellow-400 px-3 py-2 rounded-xl transition"
                        data-category="ALL">
                    All
                </button>

                <button class="filter-btn w-full text-left bg-zinc-900 hover:bg-yellow-500 hover:text-black border border-zinc-800 hover:border-yellow-400 px-3 py-2 rounded-xl transition"
                        data-category="TRAFFIC">
                    Traffic
                </button>

                <button class="filter-btn w-full text-left bg-zinc-900 hover:bg-yellow-500 hover:text-black border border-zinc-800 hover:border-yellow-400 px-3 py-2 rounded-xl transition"
                        data-category="WEATHER">
                    Weather
                </button>

                <button class="filter-btn w-full text-left bg-zinc-900 hover:bg-yellow-500 hover:text-black border border-zinc-800 hover:border-yellow-400 px-3 py-2 rounded-xl transition"
                        data-category="CRIME">
                    Crime
                </button>

                <button class="filter-btn w-full text-left bg-zinc-900 hover:bg-yellow-500 hover:text-black border border-zinc-800 hover:border-yellow-400 px-3 py-2 rounded-xl transition"
                        data-category="SPORTS">
                    Sports
                </button>

                <button class="filter-btn w-full text-left bg-zinc-900 hover:bg-yellow-500 hover:text-black border border-zinc-800 hover:border-yellow-400 px-3 py-2 rounded-xl transition"
                        data-category="POLITICS">
                    Politics
                </button>

            </div>

            <hr class="my-6 border-zinc-800" />

            <div class="mb-6">

                <label class="block mb-2 text-sm text-zinc-400">
                    Minimum Relevance Score
                </label>

                <input id="relevanceScoreSlider"
                       type="range"
                       min="0"
                       max="30"
                       value="0"
                       class="w-full accent-yellow-500" />

                <div class="mt-2 text-sm text-zinc-300">
                    Score:
                    <span id="relevanceScoreValue"
                          class="text-yellow-400 font-semibold">0</span>
                </div>

            </div>

            <div>

                <label class="block mb-2 text-sm text-zinc-400">
                    Minimum Importance Score
                </label>

                <input id="importanceScoreSlider"
                       type="range"
                       min="0"
                       max="30"
                       value="0"
                       class="w-full accent-yellow-500" />

                <div class="mt-2 text-sm text-zinc-300">
                    Score:
                    <span id="importanceScoreValue"
                          class="text-yellow-400 font-semibold">0</span>
                </div>

            </div>

        </aside>

        <!-- FEED -->
        <main class="flex-1 overflow-y-auto scrollbar p-4 md:p-6 bg-[#050505]">

            <div class="flex items-center justify-between mb-6">

                <div>

                    <h2 class="text-xl font-bold text-yellow-400">
                        Feed
                    </h2>

                    <p id="articleCount"
                       class="text-sm text-zinc-500 mt-1">
                        Loading...
                    </p>

                </div>

            </div>

            <div id="articlesContainer"
                 class="space-y-5">

            </div>

        </main>

    </div>

</div>

<script>

    // =========================================
    // CONFIG
    // =========================================

    const API_URL = "https://my-app-739800937627.us-central1.run.app/getLocalArticles";

    // =========================================
    // STATE
    // =========================================

    let articles = [];

    let selectedCategory = "ALL";

    let minimumRelevanceScore = 0;
    let minimumImportanceScore = 0;

    // =========================================
    // MOBILE SIDEBAR
    // =========================================

    const sidebar =
        document.getElementById("sidebar");

    const overlay =
        document.getElementById("mobileOverlay");

    document.getElementById("menuToggleBtn")
        .addEventListener("click", () => {

            sidebar.classList.add("open");
            overlay.classList.add("visible");
        });

    document.getElementById("closeSidebarBtn")
        .addEventListener("click", closeSidebar);

    overlay.addEventListener("click", closeSidebar);

    function closeSidebar() {

        sidebar.classList.remove("open");
        overlay.classList.remove("visible");
    }

    // =========================================
    // CATEGORY COLORS
    // =========================================

    const categoryColors = {
        TRAFFIC: "bg-orange-500/20 text-orange-300 border border-orange-500/30",
        WEATHER: "bg-blue-500/20 text-blue-300 border border-blue-500/30",
        CRIME: "bg-red-500/20 text-red-300 border border-red-500/30",
        SPORTS: "bg-yellow-500/20 text-yellow-300 border border-yellow-500/30",
        POLITICS: "bg-purple-500/20 text-purple-300 border border-purple-500/30",
        BUSINESS: "bg-green-500/20 text-green-300 border border-green-500/30",
        DEFAULT: "bg-zinc-800 text-zinc-200 border border-zinc-700"
    };

    // =========================================
    // LOAD ARTICLES
    // =========================================

    async function loadArticles() {

        try {

            const response = await fetch(API_URL);

            articles = await response.json();

            renderArticles();

        } catch (error) {

            console.error(error);

            document.getElementById("articlesContainer").innerHTML = `
                <div class="bg-red-900/30 border border-red-700 rounded-2xl p-4">
                    Failed to load articles from backend.
                </div>
            `;
        }
    }

    // =========================================
    // RENDER ARTICLES
    // =========================================

    function renderArticles() {

        const container =
            document.getElementById("articlesContainer");

        let filtered =
            articles.filter(article => {

                const matchesCategory =
                    selectedCategory === "ALL" ||
                    article.category === selectedCategory;

                const matchesRelevanceScore =
                    (article.relevanceScore || 0) >= minimumRelevanceScore;

                const matchesImportanceScore =
                    (article.importanceScore || 0) >= minimumImportanceScore;

                return matchesCategory &&
                    matchesRelevanceScore &&
                    matchesImportanceScore;
            });

        document.getElementById("articleCount").innerText =
            `${filtered.length} articles`;

        if (filtered.length === 0) {

            container.innerHTML = `
                <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 text-zinc-400">
                    No matching articles.
                </div>
            `;

            return;
        }

        container.innerHTML =
            filtered.map(article => createArticleCard(article))
                .join("");
    }

    // =========================================
    // CREATE CARD
    // =========================================

    function createArticleCard(article) {

        const category =
            article.category || "UNCATEGORIZED";

        const categoryClass =
            categoryColors[category] ||
            categoryColors.DEFAULT;

        const matchedKeywords =
            parseMatchedKeywords(article.matchedKeywords);

        return `
            <div class="bg-[#101010] border border-zinc-800 rounded-2xl p-5 hover:border-yellow-500/40 hover:shadow-lg hover:shadow-yellow-500/10 transition">

                <div class="flex items-start justify-between gap-4">

                    <div class="flex-1">

                        <div class="flex items-center gap-2 flex-wrap mb-3">

                            <span class="px-2 py-1 rounded-lg text-xs font-semibold ${categoryClass}">
                                ${category}
                            </span>

                            <span class="bg-zinc-800 px-2 py-1 rounded-lg text-xs border border-zinc-700">
                                Relevance: ${article.relevanceScore ?? 0}
                            </span>

                            <span class="bg-zinc-800 px-2 py-1 rounded-lg text-xs border border-zinc-700">
                                Importance: ${article.importanceScore ?? 0}
                            </span>

                        </div>

                        <a href="${article.articleUrl}"
                           target="_blank"
                           class="text-xl font-semibold hover:text-yellow-400 transition">

                            ${escapeHtml(article.title)}

                        </a>

                        <div class="mt-2 text-sm text-zinc-500">

                            ${escapeHtml(article.source || "Unknown Source")}
                            •
                            ${formatDate(article.publishedAt)}

                        </div>

                    </div>

                </div>

                <div class="mt-4 text-zinc-300 leading-relaxed">

                    ${escapeHtml(article.description || "No description available.")}

                </div>

                <div class="mt-5">

                    <div class="text-xs uppercase tracking-wide text-zinc-600 mb-2">
                        Matched Keywords
                    </div>

                    <div class="flex flex-wrap gap-2">

                        ${matchedKeywords.map(keyword => `
                            <span class="bg-yellow-500/10 border border-yellow-500/20 text-yellow-300 px-2 py-1 rounded-lg text-xs">
                                ${escapeHtml(keyword)}
                            </span>
                        `).join("")}

                    </div>

                </div>

            </div>
        `;
    }

    // =========================================
    // HELPERS
    // =========================================

    function parseMatchedKeywords(value) {

        if (!value) {
            return [];
        }

        if (Array.isArray(value)) {
            return value;
        }

        return value
            .split(",")
            .map(v => v.trim())
            .filter(v => v.length > 0);
    }

    function formatDate(dateString) {

        if (!dateString) {
            return "Unknown time";
        }

        return new Date(dateString)
            .toLocaleString();
    }

    function escapeHtml(text) {

        if (!text) {
            return "";
        }

        return text
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;");
    }

    // =========================================
    // FILTER EVENTS
    // =========================================

    document.querySelectorAll(".filter-btn")
        .forEach(button => {

            button.addEventListener("click", () => {

                selectedCategory =
                    button.dataset.category;

                renderArticles();

                if (window.innerWidth < 768) {
                    closeSidebar();
                }
            });
        });

    // =========================================
    // SCORE SLIDERS
    // =========================================

    const relevanceScoreSlider =
        document.getElementById("relevanceScoreSlider");

    relevanceScoreSlider.addEventListener("input", (e) => {

        minimumRelevanceScore =
            Number(e.target.value);

        document.getElementById("relevanceScoreValue")
            .innerText = minimumRelevanceScore;

        renderArticles();
    });

    const importanceScoreSlider =
        document.getElementById("importanceScoreSlider");

    importanceScoreSlider.addEventListener("input", (e) => {

        minimumImportanceScore =
            Number(e.target.value);

        document.getElementById("importanceScoreValue")
            .innerText = minimumImportanceScore;

        renderArticles();
    });

    // =========================================
    // REFRESH BUTTON
    // =========================================

    document.getElementById("refreshBtn")
        .addEventListener("click", loadArticles);

    // =========================================
    // AUTO REFRESH
    // =========================================

    setInterval(loadArticles, 300000);

    // =========================================
    // INITIAL LOAD
    // =========================================

    loadArticles();

</script>

</body>
</html>
